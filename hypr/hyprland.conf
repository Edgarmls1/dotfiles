################
### MONITORS ###
################

# monitor = eDP-1, disable
# monitor = eDP-1, 1920x1080@144, 0x0, 1
# monitor = HDMI-A-2, 1920x1080@144, 0x0, 1
# monitor = DP-1, 1366x768@59, 0x1080, 1

###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = nautilus
$menu = anyrun
$browser = zen-browser
$music = spotify

#################
### AUTOSTART ###
#################

exec-once = waybar & swaync & hyprsunset & hyprpaper
# exec-once = mpvpaper ALL -o "no-audio loop" /home/edgar/dotfiles/wallpapers/pokemon-emerald.mp4

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 0

    col.active_border = rgba(255,255,255,1)
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 1

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
          enabled = true
          size = 8
          passes = 2
          new_optimizations = yes
          ignore_opacity=true
    }
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = border, 1, 10, default
    
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = br
    kb_variant = abnt2
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

gestures {
#    workspace_swipe = false
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$super = SUPER

bind = $super, Q, exec, $terminal
bind = $super, E, exec, $fileManager
bind = $super, SPACE, exec, $menu
bind = $super, Z, exec, $browser
bind = $super, S, exec, $music

bind = CTRL, right, exec, playerctl -p spotify next
bind = CTRL, SPACE, exec, playerctl -p sptify play-pause
bind = CTRL, left, exec, playerctl -p spotify previous

bind = $super, F, exec, ~/dotfiles/scripts/full_screen.sh
bind = $super, M, exec, ~/dotfiles/scripts/monitors.sh
bind = $super, T, exec, ~/dotfiles/scripts/theme.sh

bind = $super, Escape, exec, killall waybar || waybar
bind = $super, W, exec, wleave
bind = $super, L, exec, hyprlock

bind =     , Print, exec, hyprshot -m output -m active

bind = $super, mouse_down, exec, hyprlight 5 i
bind = $super, mouse_up, exec, hyprlight 5 d

bind = $super, C, killactive,
bind = $super, V, togglefloating

bind = $super, left, movefocus, l
bind = $super, right, movefocus, r
bind = $super, up, movefocus, u
bind = $super, down, movefocus, d

bind = $super, 1,exec,hyprsome workspace 1
bind = $super, 2,exec,hyprsome workspace 2
bind = $super, 3,exec,hyprsome workspace 3
bind = $super, 4,exec,hyprsome workspace 4
bind = $super, 5,exec,hyprsome workspace 5
bind = $super, 6,exec,hyprsome workspace 6
bind = $super, 7,exec,hyprsome workspace 7
bind = $super, 8,exec,hyprsome workspace 8
bind = $super, 9,exec,hyprsome workspace 9
bind = $super, 0,exec,hyprsome workspace 10

bind = $super SHIFT, 1, exec,hyprsome move 1
bind = $super SHIFT, 2, exec,hyprsome move 2
bind = $super SHIFT, 3, exec,hyprsome move 3
bind = $super SHIFT, 4, exec,hyprsome move 4
bind = $super SHIFT, 5, exec,hyprsome move 5
bind = $super SHIFT, 6, exec,hyprsome move 6
bind = $super SHIFT, 7, exec,hyprsome move 7
bind = $super SHIFT, 8, exec,hyprsome move 8
bind = $super SHIFT, 9, exec,hyprsome move 9
bind = $super SHIFT, 0, exec,hyprsome move 10

bindm = $super, mouse:272, movewindow
bindm = $super, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl -p spotify next
bindl = , XF86AudioPause, exec, playerctl -p spotify play-pause
bindl = , XF86AudioPlay, exec, playerctl -p spotify play-pause
bindl = , XF86AudioPrev, exec, playerctl -p spotify previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Orchis-Dark"   # for GTK3 apps
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps

env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps
