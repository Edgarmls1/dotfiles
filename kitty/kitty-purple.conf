enable_background_blur yes
background_opacity 0.7
background_blur 1

font_family      Hack Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

cursor_shape block
shell_integration no-cursor
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor_trail 200
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2

scrollback_lines 2000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

mouse_hide_wait 3.0
# url_color #0087bd
url_style curly
open_url_with default
copy_on_select no
strip_trailing_spaces never

repaint_delay 10
input_delay 3
sync_to_monitor yes

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes

confirm_os_window_close 0
remember_window_size  yes
initial_window_width  640
initial_window_height 400
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 1pt
draw_minimal_borders yes
window_margin_width 0
single_window_margin_width -1
window_padding_width 4
placement_strategy center

tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

background            #422553
foreground            #c4c8c5
cursor                #c4c8c5
selection_background  #008aff
color0                #2b283d
color8                #413e53
color1                #ae0000
color9                #d3a624
color2                #3e7c54
color10               #aaaaaa
color3                #f0c75e
color11               #716254
color4                #415baf
color12               #946a2c
color5                #9445ae
color13               #b294ba
color6                #008aff
color14               #25de50
color7                #850000
color15               #c9c9c9
selection_foreground #422553

# START_AUTOGENERATED_TAB_STYLE
# Feel free to update these colors manually and remove these comments.
active_tab_foreground   #eeeeee
active_tab_background   #008aff
inactive_tab_foreground #c4c8c5
inactive_tab_background #351e42

