music_directory     "~/Music/"
db_file             "~/.local/share/mpd/database"
log_file            "~/.local/share/mpd/log"
pid_file            "~/.local/share/mpd/pid"
state_file          "~/.local/share/mpd/state"
sticker_file        "~/.local/share/mpd/sticker.sql"

auto_update         "yes"
auto_update_depth   "0"

audio_output {
    type    "pipewire"
    name    "my_output"
}

audio_output {
    type        "fifo"
    name        "cava_fifo"
    path        "/tmp/mpd.fifo"
    format      "44100:16:2"
}
