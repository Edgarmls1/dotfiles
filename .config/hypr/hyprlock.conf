general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

background {
    monitor =
    color = rgb(0d0d0d)
    blur_passes = 0
    blur_size = 0
}

# Barra superior estilo cabeçalho TUI
label {
    monitor =
    text = hyprlock
    color = rgba(55, 55, 55, 1.0)
    font_size = 11
    font_family = "Hack Nerd Font"
    position = -0, -0
    halign = left
    valign = top
}

# Hora no canto superior direito (cabeçalho)
label {
    monitor =
    text = cmd[update:1000] echo $(date +"%H:%M")
    color = rgba(255, 255, 255, 1.0)
    font_size = 11
    font_family = "Hack Nerd Font"
    position = 0, -0
    halign = right
    valign = top
}

# Linha divisória do cabeçalho (simulada por underline do label vazio)
label {
    monitor =
    text = ──────────────────────────────────────────────────────────────────────────
    color = rgba(34, 34, 34, 1.0)
    font_size = 10
    font_family = "Hack Nerd Font"
    position = 0, -18
    halign = center
    valign = top
}

# Relógio principal
label {
    monitor =
    text = cmd[update:1000] echo $(date +"%H:%M")
    color = rgba(224, 224, 224, 1.0)
    font_size = 72
    font_family = "Hack Nerd Font"
    position = 0, 80
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] echo $(date +"%a  %d %b %Y" | tr '[:upper:]' '[:lower:]')
    color = rgba(255, 255, 255, 1.0)
    font_size = 13
    font_family = "Hack Nerd Font"
    position = 0, 20
    halign = center
    valign = center
}

# Separador
label {
    monitor =
    text = ──────────────────────
    color = rgba(255, 255, 255, 1.0)
    font_size = 13
    font_family = "Hack Nerd Font"
    position = 0, -20
    halign = center
    valign = center
}

# Label "password"
label {
    monitor =
    text = password
    color = rgba(255, 255, 255, 1.0)
    font_size = 11
    font_family = "Hack Nerd Font"
    position = 0, -52
    halign = center
    valign = center
}

# Campo de senha
input-field {
    monitor =
    size = 220, 32
    outline_thickness = 1
	rounding = 0
    dots_size = 1.0
    dots_spacing = 0.4
    dots_center = true
	dots_text_format = *
    outer_color = rgba(255, 255, 255, 1.0)
    inner_color = rgba(17, 17, 17, 1.0)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text =
    hide_input = false
    check_color = rgba(136, 136, 136, 1.0)
    fail_color = rgba(120, 50, 50, 1.0)
    fail_text = <span font_family="Hack Nerd Font" size="small">$FAIL ($ATTEMPTS)</span>
    capslock_color = rgba(140, 120, 60, 1.0)
    position = 0, -86
    halign = center
    valign = center
}

# Dica de rodapé
label {
    monitor =
    text = press enter to unlock
    color = rgba(255, 255, 255, 1.0)
    font_size = 10
    font_family = "Hack Nerd Font"
    position = 0, -130
    halign = center
    valign = center
}

# Usuário no canto inferior direito
label {
    monitor =
    text = $USER@arch
    color = rgba(255, 255, 255, 1.0)
    font_size = 10
    font_family = "Hack Nerd Font"
    position = -10, 10
    halign = right
    valign = bottom
}
